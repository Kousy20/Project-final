<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Student Attendance System</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom Style -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Auth script loaded first to guard/redirect -->
    <script src="js/auth.js"></script>
</head>
<body>
    <div class="auth-wrapper">
        <div class="card auth-card p-4 p-md-5">
            <div class="card-body">
                
                <div class="text-center mb-4">
                    <img src="photo/logo_setec.png" alt="SETEC Logo" class="mx-auto mb-3 d-block" style="max-height: 70px; width: auto; object-fit: contain;">
                    <h1 class="auth-brand mb-1">Attendance System</h1>
                    <p class="text-muted small">Sign in to access your administrative dashboard</p>
                </div>

                <div id="login-error" class="alert alert-danger d-none py-2 px-3 mb-4 rounded-3" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    <span id="error-message">Invalid Email or Password!</span>
                </div>

                <form id="login-form">
                    <div class="mb-3">
                        <label for="username" class="form-label font-weight-600 small text-uppercase fw-bold text-muted">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope text-muted"></i></span>
                            <input type="email" class="form-control border-start-0 bg-light" id="username" placeholder="longkousy18@gmail.com" required value="longkousy18@gmail.com" autocomplete="username">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label font-weight-600 small text-uppercase fw-bold text-muted">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
                            <input type="password" class="form-control border-start-0 bg-light" id="password" placeholder="Enter password" required value="admin123" autocomplete="current-password">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2.5 text-white">
                        Sign In <i class="bi bi-box-arrow-in-right ms-1"></i>
                    </button>
                </form>

            </div>
        </div>
    </div>

    <!-- Login Logic -->
    <script>
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const usernameInput = document.getElementById('username').value.trim();
            const passwordInput = document.getElementById('password').value;
            const errorAlert = document.getElementById('login-error');
            const errorMessage = document.getElementById('error-message');

            const result = login(usernameInput, passwordInput);

            if (result.success) {
                errorAlert.classList.add('d-none');
                window.location.href = 'index.html';
            } else {
                errorMessage.textContent = result.message;
                errorAlert.classList.remove('d-none');
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Data - Student Attendance System</title>
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom Style -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Authentication Guard -->
    <script src="js/auth.js"></script>
</head>

<body>
    <div class="app-container">
        
        <!-- Sidebar Navigation -->
        <aside class="app-sidebar no-print">
            <div class="sidebar-brand">
                <img src="photo/logo_setec.png" alt="SETEC Logo" style="height: 38px; width: auto; object-fit: contain;">
                <span class="brand-text">Attendance System</span>
            </div>

            <nav class="sidebar-menu">
                <a href="index.html" class="sidebar-link">
                    <i class="bi bi-speedometer2"></i> Dashboard
                </a>
                <a href="attendance.html" class="sidebar-link">
                    <i class="bi bi-calendar-check"></i> Attendance
                </a>
                <a href="manage.html" class="sidebar-link active">
                    <i class="bi bi-people"></i> Manage Data
                </a>
            </nav>

            <div class="sidebar-user">
                <div class="user-details">
                    <div class="user-avatar">AD</div>
                    <div>
                        <div class="user-name">Administrator</div>
                        <div class="user-role">System Admin</div>
                    </div>
                </div>
                <button class="btn-logout-icon" onclick="logout()" title="Logout">
                    <i class="bi bi-box-arrow-right"></i>
                </button>
            </div>
        </aside>

        <!-- Main Wrapper -->
        <div class="main-wrapper">
            
            <!-- Top Navbar -->
            <header class="top-navbar no-print">
                <h2 class="top-navbar-title">Data Management</h2>
                <div id="alert-container" style="position: fixed; top: 20px; right: 20px; z-index: 1050; max-width: 380px;"></div>
            </header>

            <!-- Main Content -->
            <main class="content-body">
                
                <!-- Card Container with Tabs -->
                <div class="card shadow-sm">
                    <div class="card-header p-0 bg-light border-bottom">
                        <ul class="nav nav-tabs border-0 px-3 pt-2" id="manageTabs" role="tablist">
                            <li class="nav-item" role="presentation">
                                <button class="nav-link active fw-bold py-2.5 px-4" id="students-tab" data-bs-toggle="tab" data-bs-target="#students" type="button" role="tab" aria-controls="students" aria-selected="true">
                                    <i class="bi bi-people me-2"></i>Students Management
                                </button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link fw-bold py-2.5 px-4" id="classes-tab" data-bs-toggle="tab" data-bs-target="#classes" type="button" role="tab" aria-controls="classes" aria-selected="false">
                                    <i class="bi bi-building me-2"></i>Classes Management
                                </button>
                            </li>
                        </ul>
                    </div>
                    
                    <div class="card-body p-4">
                        <div class="tab-content" id="manageTabsContent">
                            
                            <!-- Students Tab Pane -->
                            <div class="tab-pane fade show active" id="students" role="tabpanel" aria-labelledby="students-tab">
                                <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
                                    <!-- Search Bar -->
                                    <div class="input-group" style="max-width: 350px;">
                                        <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-search"></i></span>
                                        <input type="text" id="search-student" class="form-control border-start-0" placeholder="Search by name, ID or phone...">
                                    </div>
                                    <!-- Add Button -->
                                    <button class="btn btn-primary text-white" onclick="showAddStudentModal()">
                                        <i class="bi bi-person-plus me-1"></i> Add New Student
                                    </button>
                                </div>

                                <!-- Students Table -->
                                <div class="table-responsive">
                                    <table class="table table-hover align-middle mb-0">
                                        <thead>
                                            <tr>
                                                <th>Student ID</th>
                                                <th>Full Name</th>
                                                <th>Gender</th>
                                                <th>Class</th>
                                                <th>Phone</th>
                                                <th class="text-end">Actions</th>
                                            </tr>
                                        </thead>
                                        <tbody id="student-table-body">
                                            <!-- Dynamic content -->
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                            <!-- Classes Tab Pane -->
                            <div class="tab-pane fade" id="classes" role="tabpanel" aria-labelledby="classes-tab">
                                <div class="d-flex justify-content-end mb-4">
                                    <button class="btn btn-primary text-white" onclick="showAddClassModal()">
                                        <i class="bi bi-plus-circle me-1"></i> Add New Class
                                    </button>
                                </div>

                                <!-- Classes Table -->
                                <div class="table-responsive">
                                    <table class="table table-hover align-middle mb-0">
                                        <thead>
                                            <tr>
                                                <th>Class ID</th>
                                                <th>Class Name</th>
                                                <th>Teacher</th>
                                                <th>Schedule</th>
                                                <th class="text-end">Actions</th>
                                            </tr>
                                        </thead>
                                        <tbody id="class-table-body">
                                            <!-- Dynamic content -->
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>

            </main>
        </div>

    </div>

    <!-- Student Add/Edit Modal -->
    <div class="modal fade" id="studentModal" tabindex="-1" aria-labelledby="studentModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="studentModalLabel">Add New Student</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="student-form">
                    <div class="modal-body">
                        <input type="hidden" id="student-action-mode" value="add">
                        <input type="hidden" id="original-student-id" value="">

                        <div class="mb-3">
                            <label for="student-id" class="form-label font-weight-600">Student ID</label>
                            <input type="text" class="form-control" id="student-id" placeholder="e.g. STU008" required>
                            <div class="invalid-feedback">Student ID already exists!</div>
                        </div>

                        <div class="mb-3">
                            <label for="student-name" class="form-label font-weight-600">Full Name</label>
                            <input type="text" class="form-control" id="student-name" placeholder="Enter student name" required>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label for="student-gender" class="form-label font-weight-600">Gender</label>
                                <select class="form-select" id="student-gender" required>
                                    <option value="" disabled selected>Select gender</option>
                                    <option value="Male">Male</option>
                                    <option value="Female">Female</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="student-class" class="form-label font-weight-600">Class</label>
                                <select class="form-select" id="student-class" required>
                                    <!-- Dynamic Options -->
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="student-phone" class="form-label font-weight-600">Phone Number</label>
                            <input type="text" class="form-control" id="student-phone" placeholder="e.g. 555-0199" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary text-white">Save Student</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Class Add/Edit Modal -->
    <div class="modal fade" id="classModal" tabindex="-1" aria-labelledby="classModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="classModalLabel">Add New Class</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="class-form">
                    <div class="modal-body">
                        <input type="hidden" id="class-action-mode" value="add">
                        <input type="hidden" id="original-class-id" value="">

                        <div class="mb-3">
                            <label for="class-id" class="form-label font-weight-600">Class ID</label>
                            <input type="text" class="form-control" id="class-id" placeholder="e.g. CLS004" required>
                            <div class="invalid-feedback">Class ID already exists!</div>
                        </div>

                        <div class="mb-3">
                            <label for="class-name" class="form-label font-weight-600">Class Name</label>
                            <input type="text" class="form-control" id="class-name" placeholder="e.g. Class 12-A" required>
                        </div>

                        <div class="mb-3">
                            <label for="class-teacher" class="form-label font-weight-600">Teacher Name</label>
                            <input type="text" class="form-control" id="class-teacher" placeholder="e.g. Mr. David Clark" required>
                        </div>

                        <div class="mb-3">
                            <label for="class-schedule" class="form-label font-weight-600">Schedule</label>
                            <input type="text" class="form-control" id="class-schedule" placeholder="e.g. Mon-Fri 08:00 AM" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary text-white">Save Class</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Core Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/data.js"></script>
    <script src="js/manage.js"></script>
</body>

</html>
